<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Quản Lý Học Sinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="database.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex min-h-screen">

    <aside class="w-20 bg-slate-900 text-slate-400 flex flex-col items-center py-6 gap-6 shadow-xl shrink-0 h-screen sticky top-0 z-50">
        <div class="text-white text-2xl mb-4 bg-indigo-600 p-3 rounded-xl shadow-lg shadow-indigo-600/30">
            <i class="fas fa-school"></i>
        </div>
        <button onclick="switchTab('general')" id="btn-tab-general" class="w-12 h-12 rounded-xl flex items-center justify-center transition-all text-white bg-indigo-600 shadow-lg shadow-indigo-600/20" title="Quản lý học sinh & lớp học">
            <i class="fas fa-users text-lg"></i>
        </button>
        <button onclick="switchTab('bus')" id="btn-tab-bus" class="w-12 h-12 rounded-xl flex items-center justify-center transition-all text-slate-400 hover:text-white hover:bg-slate-800" title="Danh sách xe buýt về">
            <i class="fas fa-bus text-lg"></i>
        </button>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 min-h-screen overflow-x-hidden">
        
        <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">HỆ THỐNG ĐÓN BÉ KINDYCITY Q7</h1>
                    <p class="text-xs text-slate-500">Trang quản lý dữ liệu trực tiếp lên GitHub</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="saveToFile()" id="save-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-lg font-medium shadow transition-all flex items-center gap-2 text-sm">
                        <i class="fas fa-cloud-upload-alt"></i> Đồng bộ lên GitHub
                    </button>
                </div>
            </div>
        </header>

        <main id="view-general" class="max-w-7xl w-full mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6 lg:col-span-1">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                        <i class="fas fa-tags text-indigo-500"></i> Quản Lý Danh Mục Lớp
                    </h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="new-class-input" placeholder="Tên lớp mới..." class="flex-1 px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        <button onclick="addClass()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition text-sm">Thêm</button>
                    </div>
                    <div id="class-list" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <h2 id="form-title" class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                        <i class="fas fa-user-plus text-indigo-500"></i> Thêm Bé Vào Danh Sách
                    </h2>
                    <form id="student-form" onsubmit="handleStudentSubmit(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="hidden" id="student-id">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Tên của bé</label>
                            <input type="text" id="student-name" required placeholder="Nhập họ tên đầy đủ..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Danh mục Lớp học</label>
                            <select id="student-class" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Đường dẫn tệp Ảnh</label>
                            <input type="text" id="student-image" required placeholder="Ví dụ: img/koala_an.jpg" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Đường dẫn tệp Âm thanh</label>
                            <input type="text" id="student-sound" placeholder="Nếu không nhập AI sẽ chạy" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                        
                        <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-100 pt-4 mt-2">
                            <div class="flex items-center space-x-3 h-full">
                                <input type="checkbox" id="student-is-bus" onchange="toggleBusRouteInput()" class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer">
                                <label for="student-is-bus" class="text-sm font-medium text-slate-700 cursor-pointer select-none">Bé về bằng xe buýt trường</label>
                            </div>
                            <div id="bus-route-container" class="hidden">
                                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Tuyến xe / Tài xế / Ghi chú</label>
                                <input type="text" id="student-bus-route" placeholder="Ví dụ: Tuyến số 1 - Xe 29 chỗ..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                            </div>
                        </div>

                        <div class="md:col-span-2 flex justify-end gap-2 pt-2">
                            <button type="button" id="cancel-edit-btn" onclick="resetStudentForm()" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg font-medium transition text-sm">Hủy bỏ</button>
                            <button type="submit" id="submit-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition text-sm">Lưu Vào Danh Sách</button>
                        </div>
                    </form>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                            <i class="fas fa-list-ul text-indigo-500"></i> Danh Sách Học Sinh Hiện Tại
                        </h2>
                        <div class="flex items-center gap-3">
                            <label for="filter-class" class="text-sm font-medium text-slate-600">Lọc lớp:</label>
                            <select id="filter-class" onchange="renderStudents()" class="px-3 py-1.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white font-medium">
                                <option value="all">Tất cả các lớp</option>
                            </select>
                            <span id="student-count" class="text-xs bg-indigo-100 text-indigo-700 font-bold px-2.5 py-1.5 rounded-full">0 bé</span>
                        </div>
                    </div>
                    <div class="overflow-x-auto max-h-[500px]">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-100 text-slate-600 text-xs uppercase font-bold border-b border-slate-200">
                                    <th class="px-6 py-3">Họ và Tên</th>
                                    <th class="px-6 py-3">Lớp</th>
                                    <th class="px-6 py-3">Xe Buýt</th>
                                    <th class="px-6 py-3 text-right">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="student-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <main id="view-bus" class="max-w-7xl w-full mx-auto px-6 py-8 hidden">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                    <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                        <i class="fas fa-bus text-indigo-500"></i> Danh Sách Học Sinh Về Xe Buýt Trường
                    </h2>
                    <span id="bus-student-count" class="text-xs bg-amber-100 text-amber-700 font-bold px-2.5 py-1.5 rounded-full">0 bé đi xe</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 text-xs uppercase font-bold border-b border-slate-200">
                                <th class="px-6 py-3">Họ và Tên</th>
                                <th class="px-6 py-3">Lớp</th>
                                <th class="px-6 py-3">Tuyến Xe / Ghi Chú</th>
                                <th class="px-6 py-3 text-right">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="bus-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // =========================================================
        // 1. CẤU HÌNH GITHUB CỦA BẠN (HÃY ĐIỀN CHÍNH XÁC VÀO ĐÂY)
        // =========================================================
        const GITHUB_TOKEN = "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"; 
        const GITHUB_USER = "schoolexit"; 
        const GITHUB_REPO = "schoolexit.github.io"; 

        // =========================================================
        // KIỂM TRA BẢO MẬT OTP
        // =========================================================
        (function kiemTraBaoMatNghiemNgac() {
            const sessionToken = sessionStorage.getItem('HL_ADMIN_SESSION');
            if (sessionToken !== 'AUTHENTICATED_OK') {
                alert('Cảnh báo bảo mật: Vui lòng đăng nhập để truy cập.');
                window.location.replace('login.html');
            }
        })();

        // =========================================================
        // BIẾN LƯU DỮ LIỆU CỤC BỘ
        // =========================================================
        let localData = window.kindergartenData || { classes: ["Koala", "Panda", "Dolphin", "Giraffe"], students: [] };

        document.addEventListener('DOMContentLoaded', () => {
            renderClasses();
            renderStudents();
            renderBusStudents();
        });

        // =========================================================
        // GHI DỮ LIỆU TRỰC TIẾP LÊN GITHUB API
        // =========================================================
        async function saveToFile() {
            const fileContent = "window.kindergartenData = " + JSON.stringify(localData, null, 4) + ";";
            
            // Mã hóa dữ liệu sang Base64 an toàn cho Unicode Tiếng Việt
            const encodedContent = btoa(unescape(encodeURIComponent(fileContent)));
            
            const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/database.js`;
            const btn = document.getElementById('save-btn');
            const originalBtnHTML = btn.innerHTML;
            
            try {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang đồng bộ GitHub...';
                
                // BƯỚC 1: Lấy thông tin SHA của file database.js hiện tại trên GitHub
                const getResponse = await fetch(apiUrl, {
                    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }
                });
                
                let currentSha = null;
                if (getResponse.ok) { 
                    const fileData = await getResponse.json(); 
                    currentSha = fileData.sha; 
                } else {
                    console.warn("Chưa có file database.js trên GitHub, hệ thống sẽ tự động tạo file mới.");
                }
                
                // BƯỚC 2: Cập nhật file mới lên GitHub
                const payload = { 
                    message: "Cập nhật danh sách học sinh từ hệ thống Quản Trị", 
                    content: encodedContent 
                };
                if (currentSha) payload.sha = currentSha; // Nếu file đã tồn tại thì phải gán SHA để ghi đè
                
                const putResponse = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${GITHUB_TOKEN}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!putResponse.ok) {
                    const errorDetail = await putResponse.json();
                    throw new Error(errorDetail.message || "Từ chối quyền truy cập");
                }
                
                btn.innerHTML = '<i class="fas fa-check"></i> Đã Đồng Bộ Thành Công!';
                btn.classList.replace('bg-emerald-500', 'bg-blue-600');
                setTimeout(() => { 
                    btn.innerHTML = originalBtnHTML; 
                    btn.classList.replace('bg-blue-600', 'bg-emerald-500'); 
                }, 2500);
                
            } catch (error) {
                console.error("Lỗi GitHub API:", error);
                alert("Lỗi lưu file GitHub: " + error.message + "\n\nHãy đảm bảo Token GitHub của bạn có quyền 'repo' và còn thời hạn.");
                btn.innerHTML = originalBtnHTML;
            }
        }

        // =========================================================
        // CÁC HÀM XỬ LÝ GIAO DIỆN VÀ THÊM/SỬA/XÓA HỌC SINH
        // =========================================================
        function switchTab(tabName) {
            const viewGeneral = document.getElementById('view-general');
            const viewBus = document.getElementById('view-bus');
            const btnGeneral = document.getElementById('btn-tab-general');
            const btnBus = document.getElementById('btn-tab-bus');

            if (tabName === 'general') {
                viewGeneral.classList.remove('hidden'); viewBus.classList.add('hidden');
                btnGeneral.className = "w-12 h-12 rounded-xl flex items-center justify-center transition-all text-white bg-indigo-600 shadow-lg shadow-indigo-600/20";
                btnBus.className = "w-12 h-12 rounded-xl flex items-center justify-center transition-all text-slate-400 hover:text-white hover:bg-slate-800";
                renderStudents();
            } else if (tabName === 'bus') {
                viewGeneral.classList.add('hidden'); viewBus.classList.remove('hidden');
                btnBus.className = "w-12 h-12 rounded-xl flex items-center justify-center transition-all text-white bg-indigo-600 shadow-lg shadow-indigo-600/20";
                btnGeneral.className = "w-12 h-12 rounded-xl flex items-center justify-center transition-all text-slate-400 hover:text-white hover:bg-slate-800";
                renderBusStudents();
            }
        }

        function toggleBusRouteInput() {
            const isBusChecked = document.getElementById('student-is-bus').checked;
            const container = document.getElementById('bus-route-container');
            if (isBusChecked) container.classList.remove('hidden');
            else {
                container.classList.add('hidden');
                document.getElementById('student-bus-route').value = '';
            }
        }

        function renderClasses() {
            const classList = document.getElementById('class-list');
            const studentClassSelect = document.getElementById('student-class');
            const filterClassSelect = document.getElementById('filter-class');
            
            classList.innerHTML = '';
            studentClassSelect.innerHTML = '<option value="">-- Chọn lớp học --</option>';
            
            let currentFilter = filterClassSelect ? filterClassSelect.value : 'all';
            if (filterClassSelect) filterClassSelect.innerHTML = '<option value="all">Tất cả các lớp</option>';
            
            localData.classes.forEach((className) => {
                classList.innerHTML += `
                    <div class="flex items-center justify-between bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
                        <span class="font-medium text-slate-700 text-sm">${className}</span>
                        <button onclick="deleteClass('${className}')" class="text-rose-500 hover:text-rose-700 p-1 transition"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>`;
                studentClassSelect.innerHTML += `<option value="${className}">${className}</option>`;
                if (filterClassSelect) filterClassSelect.innerHTML += `<option value="${className}">${className}</option>`;
            });

            if (filterClassSelect) filterClassSelect.value = currentFilter;
        }

        function addClass() {
            const input = document.getElementById('new-class-input');
            const className = input.value.trim();
            if (!className) return alert('Vui lòng nhập tên lớp!');
            if (localData.classes.includes(className)) return alert('Lớp này đã tồn tại!');
            localData.classes.push(className);
            input.value = '';
            renderClasses();
        }

        function deleteClass(className) {
            if (localData.students.some(s => s.class === className)) {
                if (!confirm(`Lớp ${className} đang có học sinh. Bạn vẫn muốn xóa chứ?`)) return;
            }
            localData.classes = localData.classes.filter(c => c !== className);
            renderClasses(); renderStudents(); renderBusStudents();
        }

        function renderStudents() {
            const tbody = document.getElementById('student-table-body');
            const filterClassSelect = document.getElementById('filter-class');
            const filterValue = filterClassSelect ? filterClassSelect.value : 'all';
            
            let filteredStudents = localData.students;
            if (filterValue !== 'all') filteredStudents = localData.students.filter(s => s.class === filterValue);

            document.getElementById('student-count').innerText = `${filteredStudents.length} bé`;
            tbody.innerHTML = '';

            if (filteredStudents.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-10 text-slate-400 font-medium">Chưa có dữ liệu học sinh nào.</td></tr>`;
                return;
            }

            filteredStudents.forEach((student) => {
                const busBadge = student.isBus 
                    ? `<span class="px-2 py-0.5 bg-amber-100 text-amber-800 text-xs font-bold rounded-full border border-amber-200 flex items-center gap-1 w-max"><i class="fas fa-bus text-[10px]"></i> Đi xe</span>`
                    : `<span class="text-xs text-slate-400">Tự đưa đón</span>`;

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                        <td class="px-6 py-3.5 font-semibold text-slate-900">${student.name}</td>
                        <td class="px-6 py-3.5"><span class="px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-bold border border-indigo-100">${student.class}</span></td>
                        <td class="px-6 py-3.5">${busBadge}</td>
                        <td class="px-6 py-3.5 text-right space-x-2">
                            <button onclick="editStudent('${student.id}')" class="text-indigo-600 hover:text-indigo-900 font-semibold text-xs border border-indigo-200 px-2 py-1 rounded hover:bg-indigo-50 transition">Sửa</button>
                            <button onclick="deleteStudent('${student.id}')" class="text-rose-600 hover:text-rose-900 font-semibold text-xs border border-rose-200 px-2 py-1 rounded hover:bg-rose-50 transition">Xóa</button>
                        </td>
                    </tr>`;
            });
        }

        function renderBusStudents() {
            const tbody = document.getElementById('bus-table-body');
            const busStudents = localData.students.filter(s => s.isBus === true);
            
            document.getElementById('bus-student-count').innerText = `${busStudents.length} bé đi xe`;
            tbody.innerHTML = '';

            if (busStudents.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-10 text-slate-500 font-medium bg-slate-50">Hiện tại không có bé nào về bằng xe buýt.</td></tr>`;
                return;
            }

            busStudents.forEach((student) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                        <td class="px-6 py-3.5 font-semibold text-slate-900">${student.name}</td>
                        <td class="px-6 py-3.5"><span class="px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-bold border border-indigo-100">${student.class}</span></td>
                        <td class="px-6 py-3.5 font-medium text-slate-700">${student.busRoute || 'Chưa phân tuyến'}</td>
                        <td class="px-6 py-3.5 text-right space-x-2">
                            <button onclick="editStudentFromBus('${student.id}')" class="text-indigo-600 hover:text-indigo-900 font-semibold text-xs border border-indigo-200 px-2 py-1 rounded hover:bg-indigo-50 transition">Sửa</button>
                            <button onclick="removeBusStatus('${student.id}')" class="text-rose-600 hover:text-rose-900 font-semibold text-xs border border-rose-200 px-2 py-1 rounded hover:bg-rose-50 transition">Hủy đi xe</button>
                        </td>
                    </tr>`;
            });
        }

        function editStudentFromBus(id) { switchTab('general'); editStudent(id); }

        function removeBusStatus(id) {
            if (!confirm('Bạn muốn hủy đăng ký dịch vụ xe buýt của bé này?')) return;
            const index = localData.students.findIndex(s => s.id === id);
            if (index !== -1) {
                localData.students[index].isBus = false;
                localData.students[index].busRoute = '';
                renderStudents(); renderBusStudents();
            }
        }

        function handleStudentSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('student-id').value;
            const name = document.getElementById('student-name').value.trim();
            const sClass = document.getElementById('student-class').value;
            const image = document.getElementById('student-image').value.trim();
            const sound = document.getElementById('student-sound').value.trim();
            const isBus = document.getElementById('student-is-bus').checked;
            const busRoute = document.getElementById('student-bus-route').value.trim();

            if (id) {
                const index = localData.students.findIndex(s => s.id === id);
                if (index !== -1) localData.students[index] = { id, name, class: sClass, image, sound, isBus, busRoute };
            } else {
                localData.students.push({ id: 'st-' + Date.now(), name, class: sClass, image, sound, isBus, busRoute });
            }

            resetStudentForm(); renderStudents(); renderBusStudents();
        }

        function editStudent(id) {
            const student = localData.students.find(s => s.id === id);
            if (!student) return;

            document.getElementById('student-id').value = student.id;
            document.getElementById('student-name').value = student.name;
            document.getElementById('student-class').value = student.class;
            document.getElementById('student-image').value = student.image;
            document.getElementById('student-sound').value = student.sound;
            document.getElementById('student-is-bus').checked = student.isBus || false;
            document.getElementById('student-bus-route').value = student.busRoute || '';
            
            toggleBusRouteInput();

            document.getElementById('form-title').innerHTML = `<i class="fas fa-edit text-amber-500"></i> Chỉnh Sửa Thông Tin Bé`;
            document.getElementById('submit-btn').className = "bg-amber-500 hover:bg-amber-600 text-white px-5 py-2 rounded-lg font-medium transition text-sm";
            document.getElementById('submit-btn').innerText = "Cập Nhật Lên Danh Sách";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteStudent(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa học sinh này?')) return;
            localData.students = localData.students.filter(s => s.id !== id);
            renderStudents(); renderBusStudents();
        }

        function resetStudentForm() {
            document.getElementById('student-form').reset();
            document.getElementById('student-id').value = '';
            document.getElementById('form-title').innerHTML = `<i class="fas fa-user-plus text-indigo-500"></i> Thêm Bé Vào Danh Sách`;
            document.getElementById('submit-btn').className = "bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition text-sm";
            document.getElementById('submit-btn').innerText = "Lưu Vào Danh Sách";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
            toggleBusRouteInput();
        }
    </script>
</body>
</html>
