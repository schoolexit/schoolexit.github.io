<script language="JavaScript">
  window.onload = function() {
      document.addEventListener("contextmenu", function(e) {
          e.preventDefault();
      }, false);
      document.addEventListener("keydown", function(e) {
          //document.onkeydown = function(e) {
          // "I" key
          if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
              disabledEvent(e);
          }
          // "J" key
          if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
              disabledEvent(e);
          }
          // "S" key + macOS
          if (e.keyCode == 83 && (navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey)) {
              disabledEvent(e);
          }
          // "U" key
          if (e.ctrlKey && e.keyCode == 85) {
              disabledEvent(e);
          }
          // "F12" key
          if (event.keyCode == 123) {
              disabledEvent(e);
          }
      }, false);

      function disabledEvent(e) {
          if (e.stopPropagation) {
              e.stopPropagation();
          } else if (window.event) {
              window.event.cancelBubble = true;
          }
          e.preventDefault();
          return false;
      }
  };
</script>

    <script>
        // =========================================================
        // 1. CẤU HÌNH GITHUB CỦA BẠN (HÃY SỬ DỤNG MẸO CẮT KHÚC)
        // =========================================================
        const GITHUB_TOKEN = "ghp_"+"cKXJcQq0Iia9Q6t7"+"7NGE1MHZoSvF1h4ffd7n"; 
        const GITHUB_USER = "schoolexit"; 
        const GITHUB_REPO = "schoolexit.github.io"; 
        
        // Thư mục lưu database.js
        const FILE_PATH = "database.js"; 
        
        // Thư mục lưu hình ảnh tải lên (Trên GitHub)
        const UPLOAD_FOLDER_API = "images"; 
        
        // Đường dẫn tương đối để file index.html đọc được hình ảnh
        const IMAGE_PATH_WEB = "images"; 

        // =========================================================
        // 2. KIỂM TRA BẢO MẬT OTP SESSION
        // =========================================================
        (function checkSecurity() {
            const sessionToken = sessionStorage.getItem('HL_ADMIN_SESSION');
            if (sessionToken !== 'AUTHENTICATED_OK') {
                alert('Cảnh báo bảo mật: Vui lòng đăng nhập để truy cập.');
                window.location.replace('login.html');
            }
        })();

        // Dữ liệu ban đầu
        let localData = window.kindergartenData || { classes: ["Koala", "Panda", "Dolphin", "Giraffe"], students: [] };

        document.addEventListener('DOMContentLoaded', () => {
            renderClasses();
            renderStudents();
            renderBusStudents();
        });

        // =========================================================
        // TÍNH NĂNG MỚI: TỰ ĐỘNG NÉN ẢNH < 50KB TRƯỚC KHI UPLOAD
        // =========================================================
        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const statusEl = document.getElementById('upload-status');
            const inputUrl = document.getElementById('student-image');

            statusEl.classList.remove('hidden');
            statusEl.innerHTML = '<i class="fas fa-spinner fa-spin text-indigo-500"></i> Đang nén ảnh và tải lên GitHub...';

            const reader = new FileReader();
            
            // Xử lý nén ảnh bằng công nghệ Canvas
            reader.onload = function(e) {
                const img = new Image();
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    
                    // Kích thước tối đa cho thẻ học sinh (300px là quá đủ và cực nhẹ)
                    const MAX_WIDTH = 300; 
                    const MAX_HEIGHT = 300;
                    let width = img.width;
                    let height = img.height;

                    // Tính toán tỷ lệ thu nhỏ
                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Xuất ảnh sang định dạng JPEG với chất lượng 70% để ép dung lượng xuống mức tối thiểu
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    const base64Content = dataUrl.split(',')[1];
                    
                    // Tính toán dung lượng thực tế sau khi nén (KB)
                    const sizeInBytes = Math.round((base64Content.length * 3) / 4);
                    const sizeInKB = Math.round(sizeInBytes / 1024);

                    // Chốt chặn cuối cùng: Nếu nén rồi mà vẫn > 50KB thì mới từ chối
                    if (sizeInBytes > 50 * 1024) {
                        statusEl.innerHTML = `<span class="text-rose-500"><i class="fas fa-exclamation-triangle"></i> Lỗi: Ảnh sau khi nén vẫn nặng ${sizeInKB}KB (Vượt mức 50KB). Hãy chọn ảnh khác!</span>`;
                        event.target.value = ''; // Reset input
                        return;
                    }

                    // Tự động tạo tên file không trùng lặp
                    const fileName = `img_${Date.now()}.jpg`;
                    const apiPath = `${UPLOAD_FOLDER_API}/${fileName}`;
                    const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${apiPath}`;

                    const payload = {
                        message: `Upload ảnh học sinh: ${fileName} (${sizeInKB}KB)`,
                        content: base64Content
                    };

                    try {
                        const response = await fetch(apiUrl, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${GITHUB_TOKEN}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.message);
                        }

                        // Hoàn tất: Điền link ảnh và báo cáo dung lượng cực nhẹ
                        inputUrl.value = `${IMAGE_PATH_WEB}/${fileName}`;
                        statusEl.innerHTML = `<span class="text-emerald-600"><i class="fas fa-check"></i> Đã nén cực nhẹ (chỉ còn ${sizeInKB}KB) và tải lên thành công!</span>`;
                        setTimeout(() => statusEl.classList.add('hidden'), 5000);
                        
                    } catch (error) {
                        console.error("Lỗi Upload:", error);
                        statusEl.innerHTML = `<span class="text-rose-500"><i class="fas fa-exclamation-triangle"></i> Lỗi tải lên GitHub: ${error.message}</span>`;
                    }
                };
                img.src = e.target.result;
            };
            
            reader.onerror = function() {
                statusEl.innerHTML = '<span class="text-rose-500"><i class="fas fa-exclamation-triangle"></i> Lỗi khi đọc file ảnh từ thiết bị!</span>';
            };
            
            reader.readAsDataURL(file);
        }

        // =========================================================
        // 3. ĐỒNG BỘ DATA LÊN GITHUB
        // =========================================================
        async function saveToGitHub() {
            const fileContent = "window.kindergartenData = " + JSON.stringify(localData, null, 4) + ";";
            const encodedContent = btoa(unescape(encodeURIComponent(fileContent)));
            const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
            
            const btn = document.getElementById('save-btn');
            const originalHTML = btn.innerHTML;
            
            try {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang đồng bộ...';
                
                const getRes = await fetch(apiUrl, { headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` } });
                let currentSha = null;
                if (getRes.ok) { 
                    const fileData = await getRes.json(); 
                    currentSha = fileData.sha; 
                }
                
                const payload = { message: "Dashboard: Cập nhật thông tin học sinh & biệt danh", content: encodedContent };
                if (currentSha) payload.sha = currentSha;
                
                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!putRes.ok) { const errDetail = await putRes.json(); throw new Error(errDetail.message); }
                
                btn.innerHTML = '<i class="fas fa-check"></i> Đã Đồng Bộ!';
                btn.classList.replace('bg-emerald-500', 'bg-blue-600');
                setTimeout(() => { 
                    btn.innerHTML = originalHTML; 
                    btn.classList.replace('bg-blue-600', 'bg-emerald-500'); 
                }, 2000);
                
            } catch (error) {
                alert("Lỗi đồng bộ: " + error.message);
                btn.innerHTML = originalHTML;
            }
        }

        // =========================================================
        // LOGIC QUẢN LÝ DANH SÁCH HỌC SINH
        // =========================================================
        function switchTab(tabName) {
            const viewGeneral = document.getElementById('view-general');
            const viewBus = document.getElementById('view-bus');
            const btnGeneral = document.getElementById('btn-tab-general');
            const btnBus = document.getElementById('btn-tab-bus');

            if (tabName === 'general') {
                viewGeneral.classList.remove('hidden'); viewBus.classList.add('hidden');
                btnGeneral.className = "w-12 h-12 rounded-xl flex items-center justify-center transition-all text-white bg-indigo-600 shadow-lg shadow-indigo-600/20";
                btnBus.className = "w-12 h-12 rounded-xl flex items-center justify-center transition-all text-slate-400 hover:text-white hover:bg-slate-800";
                renderStudents();
            } else if (tabName === 'bus') {
                viewGeneral.classList.add('hidden'); viewBus.classList.remove('hidden');
                btnBus.className = "w-12 h-12 rounded-xl flex items-center justify-center transition-all text-white bg-indigo-600 shadow-lg shadow-indigo-600/20";
                btnGeneral.className = "w-12 h-12 rounded-xl flex items-center justify-center transition-all text-slate-400 hover:text-white hover:bg-slate-800";
                renderBusStudents();
            }
        }

        function toggleBusRouteInput() {
            const isBusChecked = document.getElementById('student-is-bus').checked;
            const container = document.getElementById('bus-route-container');
            if (isBusChecked) container.classList.remove('hidden');
            else { container.classList.add('hidden'); document.getElementById('student-bus-route').value = ''; }
        }

        function renderClasses() {
            const classList = document.getElementById('class-list');
            const studentClassSelect = document.getElementById('student-class');
            const filterClassSelect = document.getElementById('filter-class');
            
            classList.innerHTML = '';
            studentClassSelect.innerHTML = '<option value="">-- Chọn lớp --</option>';
            if (filterClassSelect) filterClassSelect.innerHTML = '<option value="all">Tất cả lớp</option>';
            
            localData.classes.forEach((className) => {
                classList.innerHTML += `
                    <div class="flex items-center justify-between bg-slate-50 px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
                        <span class="font-medium text-slate-700 text-sm">${className}</span>
                        <button onclick="deleteClass('${className}')" class="text-rose-500 hover:text-rose-700 p-1 transition"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>`;
                studentClassSelect.innerHTML += `<option value="${className}">${className}</option>`;
                if (filterClassSelect) filterClassSelect.innerHTML += `<option value="${className}">${className}</option>`;
            });
        }

        function addClass() {
            const input = document.getElementById('new-class-input');
            const className = input.value.trim();
            if (!className) return alert('Vui lòng nhập tên lớp!');
            if (localData.classes.includes(className)) return alert('Lớp này đã tồn tại!');
            localData.classes.push(className); input.value = ''; renderClasses();
        }

        function deleteClass(className) {
            if (localData.students.some(s => s.class === className)) { if (!confirm(`Lớp ${className} đang có học sinh. Vẫn xóa chứ?`)) return; }
            localData.classes = localData.classes.filter(c => c !== className); renderClasses(); renderStudents();
        }

        function renderStudents() {
            const tbody = document.getElementById('student-table-body');
            const filterValue = document.getElementById('filter-class').value;
            
            let filtered = localData.students;
            if (filterValue !== 'all') filtered = localData.students.filter(s => s.class === filterValue);

            document.getElementById('student-count').innerText = `${filtered.length} bé`;
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-10 text-slate-400 font-medium">Chưa có dữ liệu học sinh nào.</td></tr>`;
                return;
            }

            filtered.forEach((student) => {
                const busBadge = student.isBus ? `<span class="px-2 py-0.5 bg-amber-100 text-amber-800 text-xs font-bold rounded-full border border-amber-200">Đi xe</span>` : `<span class="text-xs text-slate-400">Tự đưa đón</span>`;
                const nickDisplay = student.nickname ? ` <span class="text-indigo-600 font-bold">(${student.nickname})</span>` : '';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                        <td class="px-6 py-3.5 text-slate-900 font-semibold">${student.name}${nickDisplay}</td>
                        <td class="px-6 py-3.5"><span class="px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-bold">${student.class}</span></td>
                        <td class="px-6 py-3.5">${busBadge}</td>
                        <td class="px-6 py-3.5 text-right space-x-2">
                            <button onclick="editStudent('${student.id}')" class="text-indigo-600 hover:text-indigo-900 text-xs border border-indigo-200 px-2 py-1 rounded">Sửa</button>
                            <button onclick="deleteStudent('${student.id}')" class="text-rose-600 hover:text-rose-900 text-xs border border-rose-200 px-2 py-1 rounded">Xóa</button>
                        </td>
                    </tr>`;
            });
        }

        function renderBusStudents() {
            const tbody = document.getElementById('bus-table-body');
            const busStudents = localData.students.filter(s => s.isBus === true);
            document.getElementById('bus-student-count').innerText = `${busStudents.length} bé`;
            tbody.innerHTML = '';

            busStudents.forEach((student) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                        <td class="px-6 py-3.5 font-semibold text-slate-900">${student.name}</td>
                        <td class="px-6 py-3.5"><span class="px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-bold">${student.class}</span></td>
                        <td class="px-6 py-3.5 font-medium text-slate-700">${student.busRoute || 'Chưa phân tuyến'}</td>
                        <td class="px-6 py-3.5 text-right space-x-2">
                            <button onclick="editStudentFromBus('${student.id}')" class="text-indigo-600 hover:text-indigo-900 text-xs border border-indigo-200 px-2 py-1 rounded">Sửa</button>
                        </td>
                    </tr>`;
            });
        }

        function editStudentFromBus(id) { switchTab('general'); editStudent(id); }

        function handleStudentSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('student-id').value;
            const name = document.getElementById('student-name').value.trim();
            const nickname = document.getElementById('student-nickname').value.trim();
            const sClass = document.getElementById('student-class').value;
            const image = document.getElementById('student-image').value.trim();
            const sound = document.getElementById('student-sound').value.trim();
            const isBus = document.getElementById('student-is-bus').checked;
            const busRoute = document.getElementById('student-bus-route').value.trim();

            if (id) {
                const index = localData.students.findIndex(s => s.id === id);
                if (index !== -1) localData.students[index] = { id, name, nickname, class: sClass, image, sound, isBus, busRoute };
            } else {
                localData.students.push({ id: 'st-' + Date.now(), name, nickname, class: sClass, image, sound, isBus, busRoute });
            }

            resetStudentForm(); renderStudents(); renderBusStudents();
        }

        function editStudent(id) {
            const student = localData.students.find(s => s.id === id);
            if (!student) return;

            document.getElementById('student-id').value = student.id;
            document.getElementById('student-name').value = student.name;
            document.getElementById('student-nickname').value = student.nickname || '';
            document.getElementById('student-class').value = student.class;
            document.getElementById('student-image').value = student.image;
            document.getElementById('student-sound').value = student.sound || '';
            document.getElementById('student-is-bus').checked = student.isBus || false;
            document.getElementById('student-bus-route').value = student.busRoute || '';
            
            toggleBusRouteInput();
            document.getElementById('form-title').innerHTML = `<i class="fas fa-edit text-amber-500"></i> Chỉnh Sửa Thông Tin Bé`;
            document.getElementById('submit-btn').innerText = "Cập Nhật Lên Danh Sách";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteStudent(id) {
            if (!confirm('Bạn có chắc muốn xóa bé này?')) return;
            localData.students = localData.students.filter(s => s.id !== id);
            renderStudents(); renderBusStudents();
        }

        function resetStudentForm() {
            document.getElementById('student-form').reset();
            document.getElementById('student-id').value = '';
            document.getElementById('form-title').innerHTML = `<i class="fas fa-user-plus text-indigo-500"></i> Thêm Bé Vào Danh Sách`;
            document.getElementById('submit-btn').innerText = "Lưu Học Sinh";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
            
            // Xóa thông báo upload nếu có
            document.getElementById('upload-status').classList.add('hidden');
            
            toggleBusRouteInput();
        }
    </script>
</body>
</html>
