<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách File Cài Đặt App cơ sở</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        h2 {
            margin-top: 0;
            color: #24292e;
            border-bottom: 2px solid #eaecef;
            padding-bottom: 10px;
        }
        .loading {
            color: #6a737d;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 20px 0 0 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #fff;
            transition: all 0.2s ease;
        }
        .file-item:hover {
            background-color: #f6f8fa;
            border-color: #0366d6;
        }
        .file-info {
            display: flex;
            flex-direction: column;
        }
        .file-name {
            font-weight: 600;
            color: #24292e;
            word-break: break-all;
        }
        .file-size {
            font-size: 12px;
            color: #586069;
            margin-top: 4px;
        }
        .btn-download {
            display: inline-block;
            background-color: #2ea44f;
            color: white;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #2c974b;
        }
        .error-msg {
            color: #cb2431;
            background: #ffeef0;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }
    </style>

<style>
  body{
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  -o-user-select: none;
  user-select: none;
  }
  div.gallery {
  border: 1px solid #ccc;
  }

  div.gallery:hover {
  border: 1px solid #777;
  }

  div.gallery img {
  width: 100%;
  height: auto;
  }

  div.desc {
  padding: 15px;
  text-align: center;
  }

  * {
  box-sizing: border-box;
  }

  .responsive {
  padding: 0 6px;
  float: left;
  width: 24.99999%;
  }

  @media only screen and (max-width: 700px) {
  .responsive {
    width: 49.99999%;
    margin: 6px 0;
  }
  }

  @media only screen and (max-width: 500px) {
  .responsive {
    width: 100%;
  }
  }

  .clearfix:after {
  content: "";
  display: table;
  clear: both;
  }
  </style>

  function killCopy(e){
  return false
  }
  function reEnable(){
  return true
  }
  document.onselectstart=new Function (“return false”)
  if (window.sidebar){
  document.onmousedown=killCopy
  document.onclick=reEnable
  }
</script>
<script language="JavaScript">
  window.onload = function() {
      document.addEventListener("contextmenu", function(e) {
          e.preventDefault();
      }, false);
      document.addEventListener("keydown", function(e) {
          //document.onkeydown = function(e) {
          // "I" key
          if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
              disabledEvent(e);
          }
          // "J" key
          if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
              disabledEvent(e);
          }
          // "S" key + macOS
          if (e.keyCode == 83 && (navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey)) {
              disabledEvent(e);
          }
          // "U" key
          if (e.ctrlKey && e.keyCode == 85) {
              disabledEvent(e);
          }
          // "F12" key
          if (event.keyCode == 123) {
              disabledEvent(e);
          }
      }, false);

      function disabledEvent(e) {
          if (e.stopPropagation) {
              e.stopPropagation();
          } else if (window.event) {
              window.event.cancelBubble = true;
          }
          e.preventDefault();
          return false;
      }
  };
</script>
