<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách File Tải Về</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        h2 {
            margin-top: 0;
            color: #24292e;
            border-bottom: 2px solid #eaecef;
            padding-bottom: 10px;
        }
        .loading {
            color: #6a737d;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin: 20px 0 0 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #fff;
            transition: all 0.2s ease;
        }
        .file-item:hover {
            background-color: #f6f8fa;
            border-color: #0366d6;
        }
        .file-info {
            display: flex;
            flex-direction: column;
        }
        .file-name {
            font-weight: 600;
            color: #24292e;
            word-break: break-all;
        }
        .file-size {
            font-size: 12px;
            color: #586069;
            margin-top: 4px;
        }
        .btn-download {
            display: inline-block;
            background-color: #2ea44f;
            color: white;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #2c974b;
        }
        .error-msg {
            color: #cb2431;
            background: #ffeef0;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📁 Thư mục tải tập tin</h2>
    <div id="loading" class="loading">Đang tải danh sách file từ GitHub...</div>
    <div id="error" class="error-msg" style="display: none;"></div>
    <ul id="file-list" class="file-list"></ul>
</div>

<script>
    // ================= CONFIGURATION =================
    const OWNER = 'schoolexit';  // Ví dụ: 'octocat'
    const REPO = 'schoolexit.github.io';  // Ví dụ: 'Spoon-Knife'
    const PATH = 'apk';     // Ví dụ: 'downloads' hoặc để trống '' nếu là thư mục gốc
    // =================================================

    const apiEndpoint = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;

    // Hàm chuyển đổi size từ Byte sang KB/MB dễ đọc
    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    async function fetchGitHubFiles() {
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const listEl = document.getElementById('file-list');

        try {
            const response = await fetch(apiEndpoint);
            
            if (!response.ok) {
                throw new Error(`Không thể kết nối API GitHub (Mã lỗi: ${response.status})`);
            }

            const data = await response.json();
            loadingEl.style.display = 'none';

            // Lọc ra các item là file (bỏ qua các thư mục con nếu có)
            const files = data.filter(item => item.type === 'file');

            if (files.length === 0) {
                loadingEl.innerText = 'Thư mục trống hoặc không có file nào.';
                loadingEl.style.display = 'block';
                return;
            }

            files.forEach(file => {
                const li = document.createElement('li');
                li.className = 'file-item';

                // Sử dụng download_url để lấy trực tiếp file thô (Raw file) thay vì trang giao diện github
                li.innerHTML = `
                    <div class="file-info">
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">Dung lượng: ${formatBytes(file.size)}</span>
                    </div>
                    <a href="${file.download_url}" class="btn-download" download>Tải về</a>
                `;
                listEl.appendChild(li);
            });

        } catch (error) {
            loadingEl.style.display = 'none';
            errorEl.innerText = `Có lỗi xảy ra: ${error.message}. Vui lòng kiểm tra lại cấu hình tài khoản/repo.`;
            errorEl.style.display = 'block';
        }
    }

    // Chạy hàm khi trang web tải xong
    window.onload = fetchGitHubFiles;
</script>

</body>
</html>
