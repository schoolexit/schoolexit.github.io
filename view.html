    <script>
        const trinhPhatAmThanh = new Audio();
        let currentBranch = ""; 
        let isPlayingCustomSound = false; // Khóa kiểm soát đọc đè
        let playCount = 0; // Biến kiểm soát số lần lặp lại của file upload
        const localAssetsMap = new Map(); // Bản đồ ánh xạ tài nguyên Offline

        document.addEventListener("DOMContentLoaded", () => {
            if (window.location.pathname.endsWith('.html')) {
                const cleanUrl = window.location.pathname.substring(0, window.location.pathname.length - 5) + window.location.search;
                window.history.replaceState(null, document.title, cleanUrl);
            }

            const urlParams = new URLSearchParams(window.location.search);
            currentBranch = urlParams.get('branch');

            if (!currentBranch) {
                window.location.href = 'index';
                return;
            }

            document.getElementById('display-branch-name').innerText = currentBranch;
            
            // Vẽ giao diện lần 1 bằng tài nguyên URL gốc
            renderTabsAndContent();
            
            // Khởi động ngầm tiến trình tải toàn bộ tài nguyên offline của cơ sở
            preloadAndCacheBranchAssets();
            
            document.body.addEventListener('click', () => {
                trinhPhatAmThanh.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
                trinhPhatAmThanh.play().catch(()=>{});
            }, { once: true });
        });

        // Hàm phân giải URL sang tài nguyên đã được tải offline (nếu có)
        function getAssetUrl(url) {
            if (!url) return '';
            const cleanUrl = url.trim().replace(/\\/g, '/');
            return localAssetsMap.get(cleanUrl) || cleanUrl;
        }

        // TIẾN TRÌNH TẢI TRƯỚC VÀ LƯU TRỮ OFFLINE TOÀN BỘ TÀI NGUYÊN
        async function preloadAndCacheBranchAssets() {
            if (!window.kindergartenData) return;
            const data = window.kindergartenData;
            
            const cacLopThuocChiNhanh = data.classes.filter(c => c.branch === currentBranch);
            const cacBeThuocChiNhanh = data.students.filter(s => s.branch === currentBranch);

            const urlsToPreload = [];

            cacLopThuocChiNhanh.forEach(cls => {
                if (cls.image) urlsToPreload.push(cls.image);
            });

            cacBeThuocChiNhanh.forEach(student => {
                if (student.image) urlsToPreload.push(student.image);
                if (student.sound) {
                    let cleanUrl = student.sound.trim().replace(/\\/g, '/');
                    const coFileMP3 = cleanUrl !== "" && cleanUrl !== "sound/" && !cleanUrl.endsWith('/');
                    if (coFileMP3) urlsToPreload.push(cleanUrl);
                }
            });

            const uniqueUrls = [...new Set(urlsToPreload)];
            if (uniqueUrls.length === 0) return;

            const useCacheAPI = ('caches' in window);
            let cache = null;
            if (useCacheAPI) {
                try {
                    cache = await caches.open('kindycity-assets-' + encodeURIComponent(currentBranch));
                } catch (e) {
                    console.warn("Không mở được Cache Storage:", e);
                }
            }

            let loadedCount = 0;
            const progressBar = document.getElementById('preload-progress');

            await Promise.all(uniqueUrls.map(async (url) => {
                const cleanUrl = url.trim().replace(/\\/g, '/');
                try {
                    let response = null;
                    if (cache) {
                        response = await cache.match(cleanUrl);
                    }

                    if (!response) {
                        response = await fetch(cleanUrl);
                        if (response.ok && cache) {
                            await cache.put(cleanUrl, response.clone());
                        }
                    }

                    if (response && response.ok) {
                        const blob = await response.blob();
                        const objectURL = URL.createObjectURL(blob);
                        localAssetsMap.set(cleanUrl, objectURL);
                    }
                } catch (err) {
                    console.warn("Tải offline thất bại cho file:", cleanUrl, err);
                } finally {
                    loadedCount++;
                    const progressPercent = (loadedCount / uniqueUrls.length) * 100;
                    if (progressBar) progressBar.style.width = `${progressPercent}%`;
                }
            }));

            console.log(`Đã tải offline hoàn tất: ${localAssetsMap.size}/${uniqueUrls.length} tài nguyên.`);
            if (progressBar) {
                setTimeout(() => { progressBar.parentElement.style.display = 'none'; }, 1000);
            }
            
            // Vẽ lại giao diện lần 2 để hoán đổi toàn bộ ảnh và tiếng sang bộ nhớ Offline Blob
            renderTabsAndContent();
        }

        window.openCity = function(evt, tabId) {
            const tabs = document.getElementsByClassName("city");
            for (let i = 0; i < tabs.length; i++) tabs[i].style.display = "none";
            const activeTab = document.getElementById(tabId);
            if (activeTab) activeTab.style.display = "block";
        };

        function renderTabsAndContent() {
            if (!window.kindergartenData) return;
            const data = window.kindergartenData;

            const tabsContainer = document.getElementById("class-tabs");
            const contentContainer = document.getElementById("content");
            
            tabsContainer.innerHTML = ""; contentContainer.innerHTML = "";

            const cacLopThuocChiNhanh = data.classes.filter(c => c.branch === currentBranch);
            if (cacLopThuocChiNhanh.length === 0) {
                contentContainer.innerHTML = `<div style="text-align:center; padding: 80px 20px; color: #94a3b8; font-weight: bold;">Cơ sở này chưa được cấu hình lớp học nào.</div>`;
                return;
            }

            cacLopThuocChiNhanh.forEach((cls, index) => {
                const idName = `tab-${index}`;
                const logoSrc = getAssetUrl(cls.image);
                const fallbackAvatar = `this.outerHTML='<div style=\\'width: 5rem; height: 5rem; margin: 0 auto; background: #e0e7ff; color: #4f46e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; border: 3px solid #c7d2fe;\\'>${cls.name.charAt(0)}</div>'`;
                
                tabsContainer.innerHTML += `
                    <a onclick="openCity(event, '${idName}')" class="w3-bar-item w3-button" style="display:inline-block; margin: 0 5px; text-decoration: none;">
                        <img src="${logoSrc}" onerror="${fallbackAvatar}" style="width: 5rem; height: 5rem; object-fit: cover; border-radius: 50%; background: white;">
                        <div style="font-size: 14px; font-weight: bold; color: #4f46e5; margin-top: 5px; text-transform: uppercase;">${cls.name}</div>
                    </a>`;
                
                const displayStyle = index === 0 ? "block" : "none";
                contentContainer.innerHTML += `
                    <div class="w3-row-padding w3-padding-16 w3-center city" id="${idName}" style="display: ${displayStyle};">
                        <div class="class-wrapper"><div class="student-list" id="container-${cls.name}"></div></div>
                    </div>`;
            });

            cacLopThuocChiNhanh.forEach(cls => {
                const container = document.getElementById(`container-${cls.name}`);
                if (!container) return;

                let classStudents = data.students.filter(s => s.class === cls.name && s.branch === currentBranch);
            
                classStudents.sort((a, b) => {
                    const tenA = (a.nickname || a.name || "").trim().toLowerCase();
                    const tenB = (b.nickname || b.name || "").trim().toLowerCase();
                    return tenA.localeCompare(tenB, 'vi');
                });

                classStudents.forEach(student => {
                    const card = document.createElement('div');
                    card.className = 'responsive'; 

                    const nickHtml = student.nickname ? `<span class="nick-title">Nickname: ${student.nickname}</span>` : '';
                    card.innerHTML = `
                        <div class="gallery">
                            <img src="${getAssetUrl(student.image) || 'images/user.jpg'}" alt="${student.name}" loading="lazy">
                            <div class="desc"><span>${student.name}</span>${nickHtml}</div>
                        </div>`;

                    card.addEventListener('click', () => {
                        let thongBaoGoc = `Phụ huynh đón bé ${student.name}`;
                        if (student.nickname) {
                            thongBaoGoc += `, ${student.nickname}`;
                        }
                        thongBaoGoc += `, lớp ${student.class}, , ,`;

                        let cauThongBao = `${thongBaoGoc} Xin nhắc lại, ${thongBaoGoc}`;

                        playClickSound(student.sound, cauThongBao);
                    });

                    container.appendChild(card);
                });
            });
        }

        function playClickBus() {
            if (!window.kindergartenData || !window.kindergartenData.students) return;
            
            let danhSachXeBuyt = window.kindergartenData.students.filter(student => student.isBus === true && student.branch === currentBranch);
            
            if (danhSachXeBuyt.length === 0) {
                phatThanhAIGiongNu(`Hiện tại cơ sở không có bé nào về bằng xe buýt.`);
                return;
            }

            danhSachXeBuyt.sort((a, b) => {
                const tenA = (a.nickname || a.name || "").trim().toLowerCase();
                const tenB = (b.nickname || b.name || "").trim().toLowerCase();
                return tenA.localeCompare(tenB, 'vi');
            });

            let cauThongBaoTongHop = "Mời các bạn: ";
            danhSachXeBuyt.forEach((student, index) => {
                cauThongBaoTongHop += student.name;
                if (student.nickname) {
                     cauThongBaoTongHop += ` biệt danh ${student.nickname}`;
                }
                cauThongBaoTongHop += ` lớp ${student.class}`;
                
                if (index < danhSachXeBuyt.length - 1) {
                    cauThongBaoTongHop += ", ";
                } else {
                    cauThongBaoTongHop += " về xe buýt.";
                }
            });

            phatThanhAIGiongNu(cauThongBaoTongHop);
        }

        // HÀM PHÁT FILE GHI ÂM CHUYÊN DỤNG - ĐÃ ĐƯỢC THIẾT KẾ ĐỂ ĐỌC LẠI 2 LẦN
        function playClickSound(soundUrl, textBackup) {
            // Tắt ngay lập tức mọi câu nói AI đang đọc dở dở ương ương
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            trinhPhatAmThanh.pause();
            isPlayingCustomSound = false;
            playCount = 0; // Reset số lần phát lại về 0 mỗi khi nhấp chọn bé mới

            let cleanUrl = soundUrl ? soundUrl.trim().replace(/\\/g, '/') : '';
            const resolvedUrl = getAssetUrl(cleanUrl); // Lấy file offline blob nếu đã tải xong
            const coFileMP3 = resolvedUrl !== "" && resolvedUrl !== "sound/" && !resolvedUrl.endsWith('/');

            if (coFileMP3) {
                trinhPhatAmThanh.src = resolvedUrl;
                
                // Cấu hình sự kiện lặp lại: Tự động chạy lại lần thứ 2 khi kết thúc lần 1
                trinhPhatAmThanh.onended = () => {
                    if (playCount < 1) {
                        playCount++;
                        setTimeout(() => {
                            isPlayingCustomSound = true; // Tiếp tục giữ khóa chống AI đọc đè
                            trinhPhatAmThanh.play().catch(() => {
                                isPlayingCustomSound = false;
                            });
                        }, 800); // Trì hoãn 0.8 giây giữa hai lần đọc cho tự nhiên, rõ lời
                    } else {
                        isPlayingCustomSound = false; // Đã đọc đủ 2 lần -> Giải phóng khóa
                    }
                };

                isPlayingCustomSound = true; // Kích hoạt cờ khóa an toàn ngăn chặn AI cất tiếng
                
                let playPromise = trinhPhatAmThanh.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        // File ghi âm khởi chạy thành công -> Hủy hoàn toàn các luồng AI nền khác
                        if ('speechSynthesis' in window) {
                            window.speechSynthesis.cancel();
                        }
                    }).catch((error) => {
                        console.warn("Không thể phát được file ghi âm (File bị lỗi). Đang mở AI dự phòng:", error);
                        // Giải phóng Audio và gọi AI đọc thay thế khi file thực sự lỗi kết nối
                        isPlayingCustomSound = false;
                        trinhPhatAmThanh.pause();
                        trinhPhatAmThanh.onended = null;
                        trinhPhatAmThanh.removeAttribute('src');
                        trinhPhatAmThanh.load();
                        phatThanhAIGiongNu(textBackup);
                    });
                }
            } else {
                // Hoàn toàn không có file ghi âm upload lên -> Chạy thẳng chế độ đọc AI (Đọc 2 lần)
                phatThanhAIGiongNu(textBackup);
            }
        }

        let giongNoiHeThong = [];
        let mangCloudTTS = [];

        function capNhatHeThongGiong() { giongNoiHeThong = window.speechSynthesis.getVoices(); }
        if ('speechSynthesis' in window) {
            capNhatHeThongGiong();
            window.speechSynthesis.onvoiceschanged = capNhatHeThongGiong;
        }

        // HÀM PHÁT PHÁT THANH AI - ĐÃ KHÓA PHÁT ĐÈ FILE CUSTOM
        function phatThanhAIGiongNu(text) {
            // Nếu cờ khóa đang bật (đang chạy file ghi âm), từ chối cho AI phát thanh
            if (isPlayingCustomSound) {
                console.log("Hệ thống đang phát file ghi âm. Đã chặn cuộc gọi AI đè.");
                return;
            }

            let daPhatBangGiongCucBo = false;
            mangCloudTTS = [];
            trinhPhatAmThanh.pause();

            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.speaking) window.speechSynthesis.cancel(); 

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.98; 
                utterance.pitch = 1.05; 

                if (giongNoiHeThong.length === 0) giongNoiHeThong = window.speechSynthesis.getVoices();
                const giongTiengViet = giongNoiHeThong.filter(voice => voice.lang.includes('vi') || voice.lang.includes('VN') || voice.name.includes('Vietnamese'));

                if (giongTiengViet.length > 0) {
                    const locGiongNu = giongTiengViet.filter(voice => {
                        let ten = voice.name.toLowerCase();
                        if (ten.includes('microsoft nam') || (ten.includes('male') && !ten.includes('female'))) {
                            return false; 
                        }
                        return true;
                    });

                    let giongChonLoc = null;

                    if (locGiongNu.length > 0) {
                        // ƯU TIÊN 1: Nữ miền Nam Online (Hoài My, Wavenet-C, Southern) cực hay
                        giongChonLoc = locGiongNu.find(voice => 
                            voice.name.toLowerCase().includes('hoaimy') || 
                            voice.name.toLowerCase().includes('wavenet-c') || 
                            voice.name.toLowerCase().includes('southern')
                        );

                        // ƯU TIÊN 2: Nữ miền Bắc (Microsoft An, Linh, Mai, Wavenet-A, Northern)
                        if (!giongChonLoc) {
                            giongChonLoc = locGiongNu.find(voice => 
                                voice.name.toLowerCase().includes('microsoft an') ||
                                voice.name.toLowerCase().includes(' an ') ||
                                voice.name.toLowerCase().includes('linh') ||
                                voice.name.toLowerCase().includes('mai') ||
                                voice.name.toLowerCase().includes('wavenet-a') ||
                                voice.name.toLowerCase().includes('northern')
                            );
                        }

                        // ƯU TIÊN 3: Giọng Nữ tiêu chuẩn của Google (Mặc định trên Android/Chrome)
                        if (!giongChonLoc) {
                            giongChonLoc = locGiongNu.find(voice => voice.name.toLowerCase().includes('google'));
                        }

                        // ƯU TIÊN 4 (Cuối cùng): Lấy đại một giọng Nữ Tiếng Việt bất kỳ có trong máy
                        if (!giongChonLoc) {
                            giongChonLoc = locGiongNu[0];
                        }
                    } else {
                        giongChonLoc = giongTiengViet[0];
                    }

                    if (giongChonLoc) {
                        utterance.voice = giongChonLoc;
                        setTimeout(() => { window.speechSynthesis.speak(utterance); }, 50);
                        daPhatBangGiongCucBo = true;
                    }
                }
            }

            if (!daPhatBangGiongCucBo) {
                mangCloudTTS = text.split(',').filter(c => c.trim().length > 0);
                docTiepCloudTTS();
            }
        }

        // HÀM PHÁT THANH CLOUD TTS DỰ PHÒNG
        function docTiepCloudTTS() {
            if(mangCloudTTS.length === 0) {
                trinhPhatAmThanh.onended = () => { isPlayingCustomSound = false; };
                return;
            }
            let cau = mangCloudTTS.shift();
            const urlCloudTTS = `https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${encodeURIComponent(cau)}`;
            
            trinhPhatAmThanh.src = urlCloudTTS;
            trinhPhatAmThanh.onended = () => docTiepCloudTTS();
            trinhPhatAmThanh.onerror = () => docTiepCloudTTS();
            trinhPhatAmThanh.play().catch(err => {
                console.error(err);
                docTiepCloudTTS();
            });
        }
    </script>
