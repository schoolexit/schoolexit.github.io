<script language="JavaScript">
  window.onload = function() {
      document.addEventListener("contextmenu", function(e) {
          e.preventDefault();
      }, false);
      document.addEventListener("keydown", function(e) {
          //document.onkeydown = function(e) {
          // "I" key
          if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
              disabledEvent(e);
          }
          // "J" key
          if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
              disabledEvent(e);
          }
          // "S" key + macOS
          if (e.keyCode == 83 && (navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey)) {
              disabledEvent(e);
          }
          // "U" key
          if (e.ctrlKey && e.keyCode == 85) {
              disabledEvent(e);
          }
          // "F12" key
          if (event.keyCode == 123) {
              disabledEvent(e);
          }
      }, false);

      function disabledEvent(e) {
          if (e.stopPropagation) {
              e.stopPropagation();
          } else if (window.event) {
              window.event.cancelBubble = true;
          }
          e.preventDefault();
          return false;
      }
  };

<script>
    const trinhPhatAmThanh = new Audio();

    document.addEventListener("DOMContentLoaded", () => {
        veGiaoDienHocSinhDong();
        document.body.addEventListener('click', () => {
            trinhPhatAmThanh.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
            trinhPhatAmThanh.play().catch(()=>{});
        }, { once: true });
    });

    function veGiaoDienHocSinhDong() {
        if (!window.kindergartenData || !window.kindergartenData.students) return;
        const data = window.kindergartenData;

        data.classes.forEach(c => { const el = document.getElementById(`container-${c}`); if (el) el.innerHTML = ''; });

        data.students.forEach(student => {
            const container = document.getElementById(`container-${student.class}`);
            if (!container) return; 

            const cardWrapper = document.createElement('div');
            cardWrapper.className = 'responsive'; 

            const nickHtml = student.nickname ? `<span class="nick-title">Nick name: ${student.nickname}</span>` : '';
            cardWrapper.innerHTML = `
                <div class="gallery">
                    <img src="${student.image}" alt="${student.name}" loading="lazy">
                    <div class="desc">
                        <span>${student.name}</span>
                        ${nickHtml}
                    </div>
                </div>
            `;

            cardWrapper.addEventListener('click', () => {
                let cauThongBao = `Mời học sinh ${student.name}`;
                if (student.nickname) {
                    cauThongBao += `, , , ${student.nickname}`;
                }
                cauThongBao += `, lớp ${student.class} ra về`;

                playClickSound(student.sound, cauThongBao);
            });

            container.appendChild(cardWrapper);
        });
    }

    // =========================================================================
    // TÍNH NĂNG MỚI: PHÁT THANH GỌI DANH SÁCH XE BUÝT TẬP TRUNG KHI BẤM NÚT NỔI
    // =========================================================================
    function playClickBus() {
        if (!window.kindergartenData || !window.kindergartenData.students) return;
        
        // Lọc ra toàn bộ danh sách các bé được chọn đi xe buýt trường (isBus === true)
        const danhSachXeBuyt = window.kindergartenData.students.filter(student => student.isBus === true);
        
        if (danhSachXeBuyt.length === 0) {
            phatThanhAIGiongNu("Hiện tại không có học sinh nào đăng ký về bằng xe buýt.");
            return;
        }

        // Xây dựng câu phát thanh chuẩn theo cấu trúc yêu cầu
        let cauThongBaoTongHop = "Mời các bạn có tên sau về xe buýt: ";
        
        danhSachXeBuyt.forEach((student, index) => {
            cauThongBaoTongHop += `${student.name} lớp ${student.class}`;
            // Thêm dấu phẩy nghỉ nhịp giữa các bé, ngoại trừ bé cuối cùng
            if (index < danhSachXeBuyt.length - 1) {
                cauThongBaoTongHop += ", ";
            }
        });

        // Kích hoạt AI giọng nữ đọc danh sách tập trung
        phatThanhAIGiongNu(cauThongBaoTongHop);
    }

    function playClickSound(soundUrl, textBackup) {
        let cleanUrl = soundUrl ? soundUrl.trim().replace(/\\/g, '/') : '';
        const coFileMP3 = cleanUrl !== "" && cleanUrl !== "sound/" && !cleanUrl.endsWith('/');

        if (coFileMP3) {
            trinhPhatAmThanh.src = cleanUrl;
            trinhPhatAmThanh.play().catch(() => phatThanhAIGiongNu(textBackup));
        } else {
            phatThanhAIGiongNu(textBackup);
        }
    }

    // THUẬT TOÁN QUÉT VÀ ÉP BUỘC ĐỌC GIỌNG NỮ TIẾNG VIỆT CHUẨN XÁC DI ĐỘNG
    let giongNoiHeThong = [];
    function capNhatHeThongGiong() {
        giongNoiHeThong = window.speechSynthesis.getVoices();
    }
    
    if ('speechSynthesis' in window) {
        capNhatHeThongGiong();
        window.speechSynthesis.onvoiceschanged = capNhatHeThongGiong;
    }

    function phatThanhAIGiongNu(text) {
        let thanhCongGiongCucBo = false;

        if ('speechSynthesis' in window) {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            utterance.rate = 0.99; 

            if (giongNoiHeThong.length === 0) {
                giongNoiHeThong = window.speechSynthesis.getVoices();
            }

            const giongTiengViet = giongNoiHeThong.filter(voice => voice.lang.includes('vi') || voice.lang.includes('VN'));

            if (giongTiengViet.length > 0) {
                const locGiongNu = giongTiengViet.filter(voice => !voice.name.includes(' An'));
                
                let giongNuChuan = locGiongNu.find(voice => 
                    voice.name.toLowerCase().includes('hoaimy') || 
                    voice.name.toLowerCase().includes('linh') ||
                    voice.name.toLowerCase().includes('google')
                );

                if (!giongNuChuan && locGiongNu.length > 0) giongNuChuan = locGiongNu[0];
                if (!giongNuChuan) giongNuChuan = giongTiengViet[0];

                if (giongNuChuan) {
                    utterance.voice = giongNuChuan;
                    setTimeout(() => {
                        window.speechSynthesis.speak(utterance);
                    }, 50);
                    thanhCongGiongCucBo = true;
                }
            }
        }

        if (!thanhCongGiongCucBo) {
            const urlCloudTTS = `https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${encodeURIComponent(text)}`;
            trinhPhatAmThanh.src = urlCloudTTS;
            trinhPhatAmThanh.play().catch(err => console.error("Lỗi phát âm thanh Cloud:", err));
        }
    }
</script>
