<!DOCTYPE html>
<html lang="vi">
<head>
    <title>CHỌN CƠ SỞ | KINDYCITY</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no, maximum-scale=1.0, shrink-to-fit=no">
    <link rel="icon" type="image/png" sizes="32x32" href="images/icon/favicon-16x16.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="database.js"></script>

    <style>
        body { background: linear-gradient(135deg, #f0fdf4 0%, #e0e7ff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; -webkit-user-select: none; user-select: none; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>

    <div class="glass-card w-full max-w-lg mx-4 rounded-3xl p-8 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
        
        <img src="images/icon/favicon-512x512.png" alt="Logo" class="w-20 h-20 mx-auto mb-4 bg-white p-2 rounded-2xl shadow-md border border-slate-100">
        
        <h1 class="text-2xl font-black text-slate-800 tracking-tight mb-2">HỆ THỐNG ĐÓN BÉ</h1>
        <p class="text-sm font-medium text-slate-500 mb-8 uppercase tracking-widest">Trường Mầm Non KindyCity</p>

        <div class="text-left mb-3 pl-2 text-xs font-bold text-slate-400 uppercase tracking-wide">Vui lòng chọn cơ sở:</div>
        
        <div id="branch-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            </div>

        <div class="mt-8 pt-6 border-t border-slate-100 text-xs text-slate-400 font-medium flex items-center justify-between">
            <span>Phiên bản v2.0</span>
            <a href="login.html" class="text-indigo-500 hover:text-indigo-700 font-bold"><i class="fas fa-lock"></i> Quản trị</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('branch-container');
            const data = window.kindergartenData;

            if (!data || !data.branches || data.branches.length === 0) {
                container.innerHTML = `<div class="col-span-full text-rose-500 font-bold p-4 bg-rose-50 rounded-xl">Hệ thống chưa có dữ liệu cơ sở nào. Vui lòng vào trang quản trị để thêm!</div>`;
                return;
            }

            // Tạo các nút bấm tương ứng với số lượng chi nhánh trong Database
            data.branches.forEach((branch, index) => {
                // Mã hóa tên chi nhánh để truyền qua đường dẫn web an toàn
                const encodedBranch = encodeURIComponent(branch);
                const colors = ['indigo', 'emerald', 'amber', 'rose', 'sky', 'fuchsia'];
                const color = colors[index % colors.length]; // Xoay vòng màu sắc cho đẹp

                container.innerHTML += `
                    <button onclick="window.location.href='view.html?branch=${encodedBranch}'" 
                            class="group relative w-full flex items-center justify-between p-4 bg-white border-2 border-slate-100 hover:border-${color}-400 rounded-2xl transition-all shadow-sm hover:shadow-md cursor-pointer text-left">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-${color}-50 text-${color}-600 flex items-center justify-center text-lg shadow-inner group-hover:scale-110 transition-transform">
                                <i class="fas fa-school"></i>
                            </div>
                            <div>
                                <div class="font-bold text-slate-700 text-sm">${branch}</div>
                                <div class="text-[10px] font-medium text-slate-400">Xem danh sách</div>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-slate-300 group-hover:text-${color}-500 transition-colors"></i>
                    </button>
                `;
            });
        });
    </script>

</body>
</html>
