<!DOCTYPE html>
<html>
<head>
  <title>ĐÓN BÉ HL | TRƯỜNG MẦM NON QUỐC TẾ KINDYCITY</title>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no, maximum-scale=1.0, shrink-to-fit=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <link rel="icon" type="image/png" sizes="32x32" href="images/icon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/icon/favicon-32x32.png">
  <link rel="stylesheet" href="css/w3.css">
  <link rel="stylesheet" href="css/css.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  
  <script src="js/jquery.min.js"></script>
  <script src="js/bootstrap.min.js"></script>

  <script src="database.js"></script>

<style>
  body {
      -webkit-touch-callout: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
      background-color: #f8fafc;
  }
  * { box-sizing: border-box; }

  /* CSS GRID CHỐNG LỆCH DÒNG THÈ */
  .student-list {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 10px;
  }
  .responsive {
      width: 100% !important; float: none !important; padding: 0 !important; margin: 0 !important; display: flex; height: 100%;
  }
  div.gallery {
      border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; background: #fff;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; width: 100%; transition: 0.2s;
  }
  div.gallery:hover { border: 1px solid #a5b4fc; transform: translateY(-4px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
  div.gallery img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-bottom: 2px solid #f1f5f9; }
  
  div.desc {
      padding: 14px 8px; text-align: center; font-weight: bold; font-size: 14px; color: #4f46e5;
      flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.4;
  }
  .nick-title { font-size: 12px; color: #64748b; font-weight: normal; margin-top: 2px; }

  @media only screen and (max-width: 1024px) { .student-list { grid-template-columns: repeat(3, 1fr); } }
  @media only screen and (max-width: 768px) { .student-list { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="w3-top ">
  <div class="top-round-rainbow w3-white w3-xlarge" style="max-width:1200px;margin:auto">
    <div class="w3-center w3-padding-16">
      <a onclick="openCity(event, 'koala')" class="w3-bar-item w3-button"><img src="images/icon/koala.png" style="width: 6rem; height: 6rem;"></a>
      <a onclick="openCity(event, 'panda')" class="w3-bar-item w3-button"><img src="images/icon/panda.png" style="width: 6rem; height: 6rem;"></a>
      <a onclick="openCity(event, 'dolphin')" class="w3-bar-item w3-button"><img src="images/icon/dolphin.png" style="width: 6rem; height: 6rem;"></a>
      <a onclick="openCity(event, 'giraffe')" class="w3-bar-item w3-button"><img src="images/icon/giraffe.png" style="width: 6rem; height: 6rem;"></a>
    </div>
  </div>
</div>

<div id="content" class="w3-main w3-content w3-padding" style="max-width:1200px;margin-top:100px">
   <div class="w3-row-padding w3-padding-16 w3-center city" id="koala"><div class="class-wrapper"><div class="student-list" id="container-Koala"></div></div></div>
   <div class="w3-row-padding w3-padding-16 w3-center city" id="panda"><div class="class-wrapper"><div class="student-list" id="container-Panda"></div></div></div>
   <div class="w3-row-padding w3-padding-16 w3-center city" id="dolphin"><div class="class-wrapper"><div class="student-list" id="container-Dolphin"></div></div></div>
   <div class="w3-row-padding w3-padding-16 w3-center city" id="giraffe"><div class="class-wrapper"><div class="student-list" id="container-Giraffe"></div></div></div>
</div>

<script>
    const trinhPhatAmThanh = new Audio();

    document.addEventListener("DOMContentLoaded", () => {
        veGiaoDienHocSinhDong();
        document.body.addEventListener('click', () => {
            trinhPhatAmThanh.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
            trinhPhatAmThanh.play().catch(()=>{});
        }, { once: true });
    });

    function veGiaoDienHocSinhDong() {
        if (!window.kindergartenData || !window.kindergartenData.students) return;
        const data = window.kindergartenData;

        data.classes.forEach(c => { const el = document.getElementById(`container-${c}`); if (el) el.innerHTML = ''; });

        data.students.forEach(student => {
            const container = document.getElementById(`container-${student.class}`);
            if (!container) return; 

            const cardWrapper = document.createElement('div');
            cardWrapper.className = 'responsive'; 

            // Giao diện hiển thị tên học sinh kèm biệt danh
            const nickHtml = student.nickname ? `<span class="nick-title">Nhà gọi: ${student.nickname}</span>` : '';
            cardWrapper.innerHTML = `
                <div class="gallery">
                    <img src="${student.image}" alt="${student.name}" loading="lazy">
                    <div class="desc">
                        <span>${student.name}</span>
                        ${nickHtml}
                    </div>
                </div>
            `;

            cardWrapper.addEventListener('click', () => {
                // Xây dựng câu thông báo có đầy đủ: Họ tên, biệt danh, lớp
                let cauThongBao = `Mời học sinh ${student.name}`;
                if (student.nickname) {
                    cauThongBao += `, , , ${student.nickname}`;
                }
                cauThongBao += `, lớp ${student.class} ra về`;

                playClickSound(student.sound, cauThongBao);
            });

            container.appendChild(cardWrapper);
        });
    }

    function playClickSound(soundUrl, textBackup) {
        let cleanUrl = soundUrl ? soundUrl.trim().replace(/\\/g, '/') : '';
        const coFileMP3 = cleanUrl !== "" && cleanUrl !== "sound/" && !cleanUrl.endsWith('/');

        if (coFileMP3) {
            trinhPhatAmThanh.src = cleanUrl;
            trinhPhatAmThanh.play().catch(() => phatThanhAIGiongNu(textBackup));
        } else {
            phatThanhAIGiongNu(textBackup);
        }
    }

    // =========================================================================
    // THUẬT TOÁN QUÉT VÀ ÉP BUỘC ĐỌC GIỌNG NỮ TIẾNG VIỆT ĐÃ ĐƯỢC KHÔI PHỤC LẠI
    // =========================================================================
    let giongNoiHeThong = [];
    function capNhatHeThongGiong() {
        giongNoiHeThong = window.speechSynthesis.getVoices();
    }
    
    if ('speechSynthesis' in window) {
        capNhatHeThongGiong();
        // Lắng nghe sự kiện trình duyệt nạp xong gói ngôn ngữ
        window.speechSynthesis.onvoiceschanged = capNhatHeThongGiong;
    }

    function phatThanhAIGiongNu(text) {
        let thanhCongGiongCucBo = false;

        if ('speechSynthesis' in window) {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            utterance.rate = 0.95; 

            // Đảm bảo dữ liệu giọng đã được tải
            if (giongNoiHeThong.length === 0) {
                giongNoiHeThong = window.speechSynthesis.getVoices();
            }

            // Lọc ra các giọng có hỗ trợ Tiếng Việt
            const giongTiengViet = giongNoiHeThong.filter(voice => voice.lang.includes('vi') || voice.lang.includes('VN'));

            if (giongTiengViet.length > 0) {
                // Loại bỏ giọng nam bị lỗi (thường chứa chữ ' An' trên trình duyệt Edge/Chrome)
                const locGiongNu = giongTiengViet.filter(voice => !voice.name.includes(' An'));
                
                // Ưu tiên chọn giọng nữ chuẩn (hoaimy, linh, hoặc google)
                let giongNuChuan = locGiongNu.find(voice => 
                    voice.name.toLowerCase().includes('hoaimy') || 
                    voice.name.toLowerCase().includes('linh') ||
                    voice.name.toLowerCase().includes('google')
                );

                if (!giongNuChuan && locGiongNu.length > 0) giongNuChuan = locGiongNu[0];
                if (!giongNuChuan) giongNuChuan = giongTiengViet[0];

                if (giongNuChuan) {
                    utterance.voice = giongNuChuan;
                    setTimeout(() => {
                        window.speechSynthesis.speak(utterance);
                    }, 50);
                    thanhCongGiongCucBo = true;
                    console.log("🔊 Phát bằng giọng AI:", giongNuChuan.name);
                }
            }
        }

        // Bức tường bảo vệ cuối cùng: Nếu máy tính/điện thoại lỗi không có giọng vi-VN, 
        // Gọi thẳng lên máy chủ Google Translate để tải file ghi âm về đọc.
        if (!thanhCongGiongCucBo) {
            console.log("🚀 Chuyển sang AI Cloud TTS Giọng Nữ...");
            const urlCloudTTS = `https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${encodeURIComponent(text)}`;
            trinhPhatAmThanh.src = urlCloudTTS;
            trinhPhatAmThanh.play().catch(err => {
                console.error("Lỗi phát âm thanh Cloud:", err);
            });
        }
    }
</script>
<script src="js/scripts.js"></script>
</body>
</html>
