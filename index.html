  height: auto;
  }

  text-align: center;
  }

  * {
  box-sizing: border-box;
  }

  .responsive {
  padding: 0 6px;
  float: left;
  width: 24.99999%;
  }

  @media only screen and (max-width: 700px) {

    width: 49.99999%;
    margin: 6px 0;
  }
  }

  @media only screen and (max-width: 500px) {

  .clearfix:after {
  content: "";
  display: table;
  clear: both;
  }

<script type=”text/JavaScript”>
  function killCopy(e){
  return false
  }
  function reEnable(){
  return true
  }
  document.onselectstart=new Function (“return false”)
  if (window.sidebar){
  document.onmousedown=killCopy
  document.onclick=reEnable
  }
</script>
<script language="JavaScript">
  window.onload = function() {
      document.addEventListener("contextmenu", function(e) {
          e.preventDefault();
      }, false);
      document.addEventListener("keydown", function(e) {
          //document.onkeydown = function(e) {
          // "I" key
          if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
              disabledEvent(e);
          }
          // "J" key
          if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
              disabledEvent(e);
          }
          // "S" key + macOS
          if (e.keyCode == 83 && (navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey)) {
              disabledEvent(e);
          }
          // "U" key
          if (e.ctrlKey && e.keyCode == 85) {
              disabledEvent(e);
          }
          // "F12" key
          if (event.keyCode == 123) {
              disabledEvent(e);
          }
      }, false);

      function disabledEvent(e) {
          if (e.stopPropagation) {
              e.stopPropagation();
          } else if (window.event) {
              window.event.cancelBubble = true;
          }
          e.preventDefault();
          return false;
      }
  };
</script>

    <div class="glass-card w-full max-w-lg mx-4 rounded-3xl p-8 text-center relative overflow-hidden">

        <div class="text-left mb-3 pl-2 text-xs font-bold text-slate-400 uppercase tracking-wide">Vui lòng chọn cơ sở:</div>
        
        <div id="branch-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            </div>

        <div class="mt-8 pt-6 border-t border-slate-100 text-xs text-slate-400 font-medium flex items-center justify-between">
            <a href="download" class="text-indigo-500 hover:text-indigo-700 font-bold"><i class="fas fa-download"></i>Tải xuống</a>
            <span>Phiên bản v1.0</span>
            <a href="login" class="text-indigo-500 hover:text-indigo-700 font-bold"><i class="fas fa-lock"></i> Quản trị</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('branch-container');
            const data = window.kindergartenData;

            if (!data || !data.branches || data.branches.length === 0) {
                container.innerHTML = `<div class="col-span-full text-rose-500 font-bold p-4 bg-rose-50 rounded-xl">Hệ thống chưa có dữ liệu cơ sở nào. Vui lòng vào trang quản trị để thêm!</div>`;
                return;
            }

            data.branches.forEach((branch, index) => {
                const encodedBranch = encodeURIComponent(branch);
                const colors = ['indigo', 'emerald', 'amber', 'rose', 'sky', 'fuchsia'];
                const color = colors[index % colors.length];

                container.innerHTML += `
                    <button onclick="window.location.href='view?branch=${encodedBranch}'" 
                            class="group relative w-full flex items-center justify-between p-4 bg-white border-2 border-slate-100 hover:border-${color}-400 rounded-2xl transition-all shadow-sm hover:shadow-md cursor-pointer text-left">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-${color}-50 text-${color}-600 flex items-center justify-center text-lg shadow-inner group-hover:scale-110 transition-transform">
                                <i class="fas fa-school"></i>
                            </div>
                            <div>
                                <div class="font-bold text-slate-700 text-sm">${branch}</div>
                                <div class="text-[10px] font-medium text-slate-400">Xem danh sách</div>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-slate-300 group-hover:text-${color}-500 transition-colors"></i>
                    </button>
                `;
            });
        });
    </script>
