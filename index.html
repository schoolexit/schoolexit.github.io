    <!-- MÃ NGUỒN CỐT LÕI (RÕ RÀNG, DỄ TÙY CHỈNH) -->
    <script>
        function downloadApk() { window.location.href = 'https://schoolexit.github.io/update.apk'; }

        const trinhPhatAmThanh = new Audio();

        // 1. CHẠY KHI TRANG TẢI XONG
        document.addEventListener("DOMContentLoaded", () => {
            kiemTraVaKhoiTaoDuLieu();
            
            document.body.addEventListener('click', () => {
                trinhPhatAmThanh.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
                trinhPhatAmThanh.play().catch(()=>{});
            }, { once: true });
        });

        window.openCity = function(evt, tabId) {
            const tabs = document.getElementsByClassName("city");
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].style.display = "none";
            }
            const activeTab = document.getElementById(tabId);
            if (activeTab) activeTab.style.display = "block";
        };

        // 2. KHỞI TẠO BỘ LỌC CHI NHÁNH
        function kiemTraVaKhoiTaoDuLieu() {
            if (!window.kindergartenData) return;
            const data = window.kindergartenData;

            if (data.classes.length > 0 && typeof data.classes[0] === 'string') {
                data.classes = data.classes.map(c => ({ name: c, image: '', branch: 'TanQuy Campus' }));
            }
            if (!data.branches) data.branches = ['TanQuy Campus'];

            const selectorContainer = document.getElementById('branch-selector-container');
            const selector = document.getElementById('branch-selector');
            
            if (data.branches.length > 1) {
                selectorContainer.style.display = 'block';
                selector.innerHTML = '';
                data.branches.forEach(b => {
                    selector.innerHTML += `<option value="${b}">${b}</option>`;
                });
            }

            renderTabsAndContent();
        }

        // 3. VẼ TAB VÀ ĐỔ HỌC SINH VÀO ĐÚNG CHI NHÁNH ĐANG CHỌN
        function renderTabsAndContent() {
            const data = window.kindergartenData;
            const selector = document.getElementById('branch-selector');
            const selectedBranch = selector.value || data.branches[0];

            const tabsContainer = document.getElementById("class-tabs");
            const contentContainer = document.getElementById("content");
            
            tabsContainer.innerHTML = "";
            contentContainer.innerHTML = "";

            const cacLopThuocChiNhanh = data.classes.filter(c => c.branch === selectedBranch);

            if (cacLopThuocChiNhanh.length === 0) {
                contentContainer.innerHTML = `<div style="text-align:center; padding: 50px; color: #94a3b8; font-weight: bold;">Chi nhánh này chưa có lớp học nào.</div>`;
                return;
            }

            // VẼ TABS VÀ KHUNG CHỨA (Tự động lấy Logo)
            cacLopThuocChiNhanh.forEach((cls, index) => {
                const idName = `tab-${index}`;
                const logoSrc = cls.image || '';
                const fallbackAvatar = `this.outerHTML='<div style=\\'width: 5rem; height: 5rem; margin: 0 auto; background: #e0e7ff; color: #4f46e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; border: 3px solid #c7d2fe;\\'>${cls.name.charAt(0)}</div>'`;
                
                tabsContainer.innerHTML += `
                    <a onclick="openCity(event, '${idName}')" class="w3-bar-item w3-button" style="display:inline-block; margin: 0 5px; text-decoration: none;">
                        <img src="${logoSrc}" onerror="${fallbackAvatar}" style="width: 5rem; height: 5rem; object-fit: cover; border-radius: 50%; bg-white">
                        <div style="font-size: 14px; font-weight: bold; color: #4f46e5; margin-top: 5px; text-transform: uppercase;">${cls.name}</div>
                    </a>
                `;
                
                const displayStyle = index === 0 ? "block" : "none";
                contentContainer.innerHTML += `
                    <div class="w3-row-padding w3-padding-16 w3-center city" id="${idName}" style="display: ${displayStyle};">
                        <div class="class-wrapper">
                            <div class="student-list" id="container-${cls.name}"></div>
                        </div>
                    </div>
                `;
            });

            // VẼ HỌC SINH
            cacLopThuocChiNhanh.forEach(cls => {
                const container = document.getElementById(`container-${cls.name}`);
                if (!container) return;

                const classStudents = data.students.filter(s => s.class === cls.name && s.branch === cls.branch);
                
                classStudents.forEach(student => {
                    const card = document.createElement('div');
                    card.className = 'responsive'; 

                    const nickHtml = student.nickname ? `<span class="nick-title">Nhà gọi: ${student.nickname}</span>` : '';
                    card.innerHTML = `
                        <div class="gallery">
                            <img src="${student.image}" alt="${student.name}" loading="lazy">
                            <div class="desc">
                                <span>${student.name}</span>
                                ${nickHtml}
                            </div>
                        </div>
                    `;

                    card.addEventListener('click', () => {
                        let cauThongBao = `Mời học sinh ${student.name}`;
                        if (student.nickname) cauThongBao += `, biệt danh ${student.nickname}`;
                        cauThongBao += `, lớp ${student.class} ra về`;
                        playClickSound(student.sound, cauThongBao);
                    });

                    container.appendChild(card);
                });
            });
        }

        // 4. GỌI XE BUÝT TẬP TRUNG
        function playClickBus() {
            if (!window.kindergartenData || !window.kindergartenData.students) return;
            
            // Lọc ra các học sinh đi xe buýt thuộc chi nhánh đang hiển thị
            const selector = document.getElementById('branch-selector');
            const selectedBranch = selector.value || window.kindergartenData.branches[0];

            const danhSachXeBuyt = window.kindergartenData.students.filter(student => student.isBus === true && student.branch === selectedBranch);
            
            if (danhSachXeBuyt.length === 0) {
                phatThanhAIGiongNu("Hiện tại cơ sở này không có học sinh nào về bằng xe buýt.");
                return;
            }

            let cauThongBaoTongHop = "Mời các bạn có tên sau về xe buýt: ";
            danhSachXeBuyt.forEach((student, index) => {
                cauThongBaoTongHop += `${student.name} lớp ${student.class}`;
                if (index < danhSachXeBuyt.length - 1) cauThongBaoTongHop += ", ";
            });

            phatThanhAIGiongNu(cauThongBaoTongHop);
        }

        function playClickSound(soundUrl, textBackup) {
            let cleanUrl = soundUrl ? soundUrl.trim().replace(/\\/g, '/') : '';
            const coFileMP3 = cleanUrl !== "" && cleanUrl !== "sound/" && !cleanUrl.endsWith('/');

            if (coFileMP3) {
                trinhPhatAmThanh.src = cleanUrl;
                trinhPhatAmThanh.play().catch(() => phatThanhAIGiongNu(textBackup));
            } else {
                phatThanhAIGiongNu(textBackup);
            }
        }

        // 5. TRÍ TUỆ NHÂN TẠO - ĐỌC GIỌNG NỮ TIẾNG VIỆT
        let giongNoiHeThong = [];
        
        function capNhatHeThongGiong() {
            giongNoiHeThong = window.speechSynthesis.getVoices();
        }
        if ('speechSynthesis' in window) {
            capNhatHeThongGiong();
            window.speechSynthesis.onvoiceschanged = capNhatHeThongGiong;
        }

        function phatThanhAIGiongNu(text) {
            let daPhatBangGiongCucBo = false;

            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.speaking) window.speechSynthesis.cancel(); 

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.95; 

                if (giongNoiHeThong.length === 0) giongNoiHeThong = window.speechSynthesis.getVoices();

                const giongTiengViet = giongNoiHeThong.filter(voice => 
                    voice.lang.includes('vi') || voice.lang.includes('VN') || voice.name.includes('Vietnamese')
                );

                if (giongTiengViet.length > 0) {
                    const tuKhoaGiongNam = [' an', ' nam', ' minh', 'male', 'david', 'mark'];
                    const locGiongNu = giongTiengViet.filter(voice => {
                        let ten = voice.name.toLowerCase();
                        return !tuKhoaGiongNam.some(tu => ten.includes(tu));
                    });
                    
                    let giongNuMienNam = locGiongNu.find(voice => 
                        voice.name.toLowerCase().includes('hoaimy') || voice.name.toLowerCase().includes('linh')      
                    );

                    if (!giongNuMienNam) giongNuMienNam = locGiongNu.find(voice => voice.name.toLowerCase().includes('google'));
                    if (!giongNuMienNam && locGiongNu.length > 0) giongNuMienNam = locGiongNu[0];

                    if (giongNuMienNam) {
                        utterance.voice = giongNuMienNam;
                        setTimeout(() => { window.speechSynthesis.speak(utterance); }, 50);
                        daPhatBangGiongCucBo = true;
                    }
                }
            }

            if (!daPhatBangGiongCucBo) {
                const urlCloudTTS = `https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${encodeURIComponent(text)}`;
                trinhPhatAmThanh.src = urlCloudTTS;
                trinhPhatAmThanh.play().catch(err => console.error(err));
            }
        }
    </script>
