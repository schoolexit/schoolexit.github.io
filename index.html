  /* =========================================
     CÔNG NGHỆ CSS GRID CHỐNG LỆCH DÒNG THẺ
     ========================================= */
  .student-list {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 10px;
  }

  .responsive {
      width: 100% !important;
      float: none !important;
      padding: 0 !important;
      margin: 0 !important;
      display: flex;
      height: 100%;
  }

  div.gallery {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      width: 100%;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-bottom: 0 !important; 
  }

  div.gallery:hover {
      border: 1px solid #a5b4fc;
      transform: translateY(-4px);
      box-shadow: 0 10px 15px rgba(0,0,0,0.1);
  }

  div.gallery img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-bottom: 2px solid #f1f5f9;
  }

  div.desc {
      padding: 14px 8px;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
      color: #4f46e5;
      text-transform: capitalize;
      flex-grow: 1; /* Ép các thẻ phải cao bằng nhau */
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.4;
  }

  .clearfix { display: none !important; }

  /* Reponsive cho Di động & Tablet */
  @media only screen and (max-width: 1024px) {
      .student-list { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  }
  @media only screen and (max-width: 768px) {
      .student-list { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      div.desc { font-size: 13px; padding: 12px 6px; }
  }
  @media only screen and (max-width: 480px) {
      .student-list { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      div.desc { font-size: 12px; padding: 10px 4px; }
  }
</style>

          if (e.keyCode == 83 && (navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey)) disabledEvent(e);
          if (e.ctrlKey && e.keyCode == 85) disabledEvent(e);

          if (e.stopPropagation) e.stopPropagation(); else if (window.event) window.event.cancelBubble = true;

<script>
    const trinhPhatAmThanh = new Audio();

    document.addEventListener("DOMContentLoaded", () => {
        veGiaoDienHocSinhDong();
        
        let daMoKhoaAI = false;
        document.body.addEventListener('click', function() {
            if (!daMoKhoaAI) {
                // Kích hoạt loa tàng hình trên điện thoại
                trinhPhatAmThanh.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
                trinhPhatAmThanh.play().catch(()=>{});
                
                if ('speechSynthesis' in window) {
                    let utterance = new SpeechSynthesisUtterance(''); 
                    window.speechSynthesis.speak(utterance);
                }
                daMoKhoaAI = true;
                console.log("🔓 Trình duyệt di động đã mở khóa hệ thống AI");
            }
        }, { once: true });
    });

    function veGiaoDienHocSinhDong() {
        if (!window.kindergartenData || !window.kindergartenData.students) return;
        
        const data = window.kindergartenData;

        // Xóa sạch thùng chứa cũ
        data.classes.forEach(className => {
            const container = document.getElementById(`container-${className}`);
            if (container) container.innerHTML = '';
        });

        // Vẽ thẻ học sinh mới
        data.students.forEach(student => {
            const container = document.getElementById(`container-${student.class}`);
            if (!container) return; 

            const cardWrapper = document.createElement('div');
            cardWrapper.className = 'responsive'; 

            cardWrapper.innerHTML = `
                <div class="gallery">
                    <img src="${student.image}" alt="${student.name}" loading="lazy">
                    <div class="desc">${student.name}</div>
                </div>
            `;

            cardWrapper.addEventListener('click', () => {
                playClickSound(student.sound, student.name, student.class);
            });

            container.appendChild(cardWrapper);
        });
    }

    // HỆ THỐNG ÂM THANH
    function playClickSound(soundUrl, studentName, className) {
        let cleanUrl = soundUrl ? soundUrl.trim().replace(/\\/g, '/') : '';
        const coFileAmThanh = cleanUrl !== "" && cleanUrl !== "sound/" && !cleanUrl.endsWith('/');

        if (coFileAmThanh) {
            trinhPhatAmThanh.src = cleanUrl;
            trinhPhatAmThanh.play().catch(error => {
                console.warn("Lỗi tệp MP3 gốc, kích hoạt AI dự phòng:", error);
                phatThanhAIGiongNu(`Mời học sinh ${studentName} lớp ${className} ra về`);
            });
        } else {
            phatThanhAIGiongNu(`Mời học sinh ${studentName} lớp ${className} ra về`);
        }
    }

    let giongNoiHeThong = [];
    function capNhatHeThongGiong() {
        giongNoiHeThong = window.speechSynthesis.getVoices();
    }
    
    if (window.speechSynthesis) {
        capNhatHeThongGiong();
        window.speechSynthesis.onvoiceschanged = capNhatHeThongGiong;
    }

    function phatThanhAIGiongNu(text) {
        let thanhCongGiongCucBo = false;

        if ('speechSynthesis' in window) {
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';
            utterance.rate = 0.99; 

            if (giongNoiHeThong.length === 0) {
                giongNoiHeThong = window.speechSynthesis.getVoices();
            }

            const giongTiengViet = giongNoiHeThong.filter(voice => voice.lang.includes('vi') || voice.lang.includes('VN'));

            if (giongTiengViet.length > 0) {
                const locGiongNu = giongTiengViet.filter(voice => !voice.name.includes(' An'));
                
                let giongNuChuan = locGiongNu.find(voice => 
                    voice.name.toLowerCase().includes('hoaimy') || 
                    voice.name.toLowerCase().includes('linh') ||
                    voice.name.toLowerCase().includes('google')
                );

                if (!giongNuChuan && locGiongNu.length > 0) giongNuChuan = locGiongNu[0];
                if (!giongNuChuan) giongNuChuan = giongTiengViet[0];

                if (giongNuChuan) {
                    utterance.voice = giongNuChuan;
                    setTimeout(() => {
                        window.speechSynthesis.speak(utterance);
                    }, 50);
                    thanhCongGiongCucBo = true;
                    console.log("🔊 Phát bằng giọng AI:", giongNuChuan.name);
                }
            }
        }

        if (!thanhCongGiongCucBo) {
            console.log("🚀 Chuyển sang AI Cloud TTS Giọng Nữ...");
            const urlCloudTTS = `https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q=${encodeURIComponent(text)}`;
            trinhPhatAmThanh.src = urlCloudTTS;
            trinhPhatAmThanh.play().catch(err => {
                console.error("Lỗi phát âm thanh Cloud:", err);
            });
        }
    }
</script>
